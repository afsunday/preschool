<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Scattered alphabet flashcards showing the letters A, B, C and D">
  <rect width="1200" height="400" fill="#6B4A9E"/>
  <circle cx="880" cy="200" r="235" fill="#000" opacity="0.08"/>

  <!-- card A -->
  <g transform="rotate(-13 712 258)">
    <rect x="652" y="185" width="128" height="158" rx="10" fill="#000" opacity="0.12"/>
    <rect x="648" y="179" width="128" height="158" rx="10" fill="#FFF6F9"/>
    <text x="712" y="282" font-family="Verdana,DejaVu Sans,sans-serif" font-size="84" font-weight="bold" fill="#E8618C" text-anchor="middle">A</text>
    <rect x="672" y="304" width="80" height="8" rx="4" fill="#E8618C"/>
  </g>

  <!-- card B -->
  <g transform="rotate(7 836 224)">
    <rect x="776" y="151" width="128" height="158" rx="10" fill="#000" opacity="0.12"/>
    <rect x="772" y="145" width="128" height="158" rx="10" fill="#FFF6F9"/>
    <text x="836" y="248" font-family="Verdana,DejaVu Sans,sans-serif" font-size="84" font-weight="bold" fill="#7C5CFF" text-anchor="middle">B</text>
    <rect x="796" y="270" width="80" height="8" rx="4" fill="#7C5CFF"/>
  </g>

  <!-- card C -->
  <g transform="rotate(-6 952 268)">
    <rect x="892" y="195" width="128" height="158" rx="10" fill="#000" opacity="0.12"/>
    <rect x="888" y="189" width="128" height="158" rx="10" fill="#FFF6F9"/>
    <text x="952" y="292" font-family="Verdana,DejaVu Sans,sans-serif" font-size="84" font-weight="bold" fill="#1E8A62" text-anchor="middle">C</text>
    <rect x="912" y="314" width="80" height="8" rx="4" fill="#31C48D"/>
  </g>

  <!-- card D -->
  <g transform="rotate(15 1052 198)">
    <rect x="992" y="125" width="128" height="158" rx="10" fill="#000" opacity="0.12"/>
    <rect x="988" y="119" width="128" height="158" rx="10" fill="#FFF6F9"/>
    <text x="1052" y="222" font-family="Verdana,DejaVu Sans,sans-serif" font-size="84" font-weight="bold" fill="#E0A413" text-anchor="middle">D</text>
    <rect x="1012" y="244" width="80" height="8" rx="4" fill="#FFC94A"/>
  </g>
</svg>
