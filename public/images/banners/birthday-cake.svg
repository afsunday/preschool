<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Layered birthday cake with candles and a slice on a plate">
  <!-- Google-Classroom-style flat lay: solid field on the left for the class
       title, objects clustered right on a soft disc. -->
  <rect width="1200" height="400" fill="#7C5CFF"/>
  <circle cx="880" cy="200" r="235" fill="#000" opacity="0.08"/>

  <!-- layered cake -->
  <g transform="rotate(-3 812 250)">
    <g fill="#000" opacity="0.12" transform="translate(0 6)">
      <path d="M700 240h224v76a10 10 0 0 1-10 10H710a10 10 0 0 1-10-10z"/>
      <rect x="742" y="178" width="140" height="62"/>
    </g>
    <path d="M700 240h224v76a10 10 0 0 1-10 10H710a10 10 0 0 1-10-10z" fill="#FFF6F9"/>
    <rect x="742" y="178" width="140" height="62" fill="#FFF6F9"/>
    <path d="M700 240h224v14q-14 16-28 0q-14 16-28 0q-14 16-28 0q-14 16-28 0q-14 16-28 0q-14 16-28 0q-14 16-28 0q-14 16-28 0z" fill="#E8618C"/>
    <path d="M742 178h140v12q-14 14-28 0q-14 14-28 0q-14 14-28 0q-14 14-28 0q-14 14-28 0z" fill="#31C48D"/>
    <rect x="768" y="136" width="12" height="46" fill="#E8455A"/>
    <rect x="806" y="136" width="12" height="46" fill="#5B6BD6"/>
    <rect x="844" y="136" width="12" height="46" fill="#31C48D"/>
    <g fill="#FFF" opacity="0.35">
      <rect x="768" y="150" width="12" height="6"/>
      <rect x="806" y="150" width="12" height="6"/>
      <rect x="844" y="150" width="12" height="6"/>
    </g>
    <g fill="#FFC94A">
      <path d="M774 110c7 9 9 13 9 17a9 9 0 0 1-18 0c0-4 2-8 9-17z"/>
      <path d="M812 110c7 9 9 13 9 17a9 9 0 0 1-18 0c0-4 2-8 9-17z"/>
      <path d="M850 110c7 9 9 13 9 17a9 9 0 0 1-18 0c0-4 2-8 9-17z"/>
    </g>
  </g>

  <!-- slice on a plate -->
  <g transform="rotate(-4 1024 300)">
    <ellipse cx="1024" cy="306" rx="94" ry="32" fill="#000" opacity="0.12"/>
    <ellipse cx="1024" cy="300" rx="94" ry="32" fill="#FFFFFF"/>
    <ellipse cx="1024" cy="300" rx="72" ry="22" fill="#FFF6F9"/>
    <path d="M968 306L1062 278L1062 326z" fill="#000" opacity="0.12"/>
    <path d="M968 300L1062 272L1062 320z" fill="#F2E3C4"/>
    <path d="M1016 286L1026 283L1026 312L1016 310z" fill="#E8618C"/>
    <path d="M1062 272L1062 320L1048 313L1048 279z" fill="#E8618C"/>
  </g>

  <!-- spare candles -->
  <g transform="rotate(-12 696 336)">
    <rect x="654" y="334" width="84" height="16" rx="8" fill="#000" opacity="0.12"/>
    <rect x="654" y="328" width="84" height="16" rx="8" fill="#E8455A"/>
    <rect x="668" y="332" width="44" height="5" rx="2" fill="#FFF" opacity="0.35"/>
    <path d="M740 336h10" stroke="#3A3A48" stroke-width="5" stroke-linecap="round"/>
  </g>
  <g transform="rotate(9 812 338)">
    <rect x="770" y="336" width="84" height="16" rx="8" fill="#000" opacity="0.12"/>
    <rect x="770" y="330" width="84" height="16" rx="8" fill="#31C48D"/>
    <rect x="784" y="334" width="44" height="5" rx="2" fill="#FFF" opacity="0.35"/>
    <path d="M856 338h10" stroke="#3A3A48" stroke-width="5" stroke-linecap="round"/>
  </g>
