  <!-- open book -->
  <g transform="rotate(-6 850 230)">
    <path d="M700 170q80-26 150 0v130q-70-26-150 0z" fill="#000" opacity="0.12" transform="translate(0 10)"/>
    <path d="M700 170q80-26 150 0v130q-70-26-150 0z" fill="#FFFFFF"/>
    <path d="M1000 170q-80-26-150 0v130q70-26 150 0z" fill="#FFF6F9"/>
