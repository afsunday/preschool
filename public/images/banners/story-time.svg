  <!-- pencil -->
  <g transform="rotate(38 760 320)">
    <rect x="676" y="312" width="170" height="24" rx="4" fill="#000" opacity="0.12"/>
    <rect x="672" y="306" width="150" height="24" rx="3" fill="#FFC94A"/>
    <path d="M822 306l32 12-32 12z" fill="#F2E3C4"/>
    <path d="M846 313l8 5-8 5z" fill="#3A3A48"/>
