<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Alphabet blocks and a ball">
  <rect width="1200" height="400" fill="#5B6BD6"/>
  <circle cx="880" cy="200" r="235" fill="#000" opacity="0.08"/>

  <!-- stacked blocks -->
  <g>
    <rect x="712" y="252" width="112" height="112" rx="10" fill="#000" opacity="0.12"/>
    <rect x="706" y="246" width="112" height="112" rx="10" fill="#E8618C"/>
    <text x="762" y="322" font-family="Verdana,DejaVu Sans,sans-serif" font-size="62" font-weight="bold" fill="#FFF6F9" text-anchor="middle">A</text>

    <rect x="836" y="252" width="112" height="112" rx="10" fill="#000" opacity="0.12"/>
    <rect x="830" y="246" width="112" height="112" rx="10" fill="#FFC94A"/>
    <text x="886" y="322" font-family="Verdana,DejaVu Sans,sans-serif" font-size="62" font-weight="bold" fill="#3A3A48" text-anchor="middle">B</text>

    <rect x="774" y="134" width="112" height="112" rx="10" fill="#000" opacity="0.12"/>
    <rect x="768" y="128" width="112" height="112" rx="10" fill="#31C48D"/>
    <text x="824" y="204" font-family="Verdana,DejaVu Sans,sans-serif" font-size="62" font-weight="bold" fill="#FFF6F9" text-anchor="middle">C</text>
  </g>

  <!-- ball -->
  <g>
    <ellipse cx="1024" cy="342" rx="58" ry="16" fill="#000" opacity="0.12"/>
    <circle cx="1024" cy="288" r="62" fill="#FFF6F9"/>
    <path d="M1024 226a62 62 0 0 1 0 124 62 62 0 0 1 0-124z" fill="#7C5CFF" opacity="0.15"/>
    <path d="M962 288h124" stroke="#7C5CFF" stroke-width="8"/>
    <path d="M1024 226q34 62 0 124" fill="none" stroke="#7C5CFF" stroke-width="8"/>
    <path d="M1024 226q-34 62 0 124" fill="none" stroke="#7C5CFF" stroke-width="8"/>
  </g>

  <!-- toy rings -->
  <g transform="rotate(-12 662 190)">
    <ellipse cx="662" cy="196" rx="46" ry="14" fill="#000" opacity="0.12"/>
    <ellipse cx="662" cy="188" rx="46" ry="14" fill="#31C48D"/>
    <ellipse cx="662" cy="188" rx="18" ry="6" fill="#5B6BD6"/>
    <ellipse cx="662" cy="164" rx="38" ry="12" fill="#FFC94A"/>
    <ellipse cx="662" cy="164" rx="15" ry="5" fill="#5B6BD6"/>
    <ellipse cx="662" cy="142" rx="30" ry="10" fill="#E8618C"/>
    <ellipse cx="662" cy="142" rx="12" ry="4" fill="#5B6BD6"/>
  </g>
</svg>
