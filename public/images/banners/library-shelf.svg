<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Row of book spines on a shelf with two books pulled out">
  <rect width="1200" height="400" fill="#D98A1F"/>
  <circle cx="880" cy="200" r="235" fill="#000" opacity="0.08"/>

  <!-- shelf plank -->
  <rect x="642" y="334" width="496" height="20" rx="4" fill="#000" opacity="0.12"/>
  <rect x="638" y="328" width="496" height="20" rx="4" fill="#F2E3C4"/>

  <!-- row of spines -->
  <g>
    <rect x="668" y="166" width="46" height="168" rx="5" fill="#000" opacity="0.12"/>
    <rect x="664" y="160" width="46" height="168" rx="5" fill="#7C5CFF"/>
    <rect x="664" y="188" width="46" height="9" fill="#5B3AC4"/>
    <rect x="675" y="216" width="24" height="6" rx="3" fill="#FFF6F9"/>

    <rect x="720" y="148" width="54" height="186" rx="5" fill="#000" opacity="0.12"/>
    <rect x="716" y="142" width="54" height="186" rx="5" fill="#E8618C"/>
    <rect x="716" y="172" width="54" height="9" fill="#FFF6F9"/>
    <rect x="729" y="202" width="28" height="6" rx="3" fill="#FFF6F9"/>

    <rect x="780" y="174" width="42" height="160" rx="5" fill="#000" opacity="0.12"/>
    <rect x="776" y="168" width="42" height="160" rx="5" fill="#31C48D"/>
    <rect x="776" y="194" width="42" height="9" fill="#1E8A62"/>
    <rect x="786" y="220" width="22" height="6" rx="3" fill="#FFF6F9"/>

    <rect x="894" y="152" width="50" height="182" rx="5" fill="#000" opacity="0.12"/>
    <rect x="890" y="146" width="50" height="182" rx="5" fill="#5B6BD6"/>
    <rect x="890" y="176" width="50" height="9" fill="#3A3A48"/>
    <rect x="902" y="206" width="26" height="6" rx="3" fill="#FFF6F9"/>

    <rect x="954" y="172" width="44" height="162" rx="5" fill="#000" opacity="0.12"/>
    <rect x="950" y="166" width="44" height="162" rx="5" fill="#FFF6F9"/>
    <rect x="950" y="192" width="44" height="9" fill="#B9BCC4"/>
    <rect x="961" y="220" width="22" height="6" rx="3" fill="#B9BCC4"/>
  </g>

  <!-- book pulled out and leaning -->
  <g transform="rotate(-11 872 328)">
    <rect x="832" y="158" width="48" height="176" rx="5" fill="#000" opacity="0.12"/>
    <rect x="828" y="152" width="48" height="176" rx="5" fill="#FFC94A"/>
    <rect x="828" y="180" width="48" height="9" fill="#E0A413"/>
    <rect x="840" y="209" width="24" height="6" rx="3" fill="#FFF6F9"/>
  </g>

  <!-- book pulled out and laid down in front -->
  <g transform="rotate(-5 1055 308)">
    <rect x="984" y="292" width="150" height="44" rx="6" fill="#000" opacity="0.12"/>
    <rect x="980" y="286" width="150" height="44" rx="6" fill="#E8455A"/>
    <rect x="1000" y="292" width="124" height="32" rx="3" fill="#FFF6F9"/>
    <rect x="980" y="286" width="20" height="44" rx="6" fill="#3A3A48"/>
    <rect x="1006" y="300" width="106" height="4" rx="2" fill="#B9BCC4"/>
    <rect x="1006" y="314" width="106" height="4" rx="2" fill="#B9BCC4"/>
  </g>
</svg>
