      <ellipse cx="1015" cy="203" rx="40" ry="22" transform="rotate(30 1015 203)"/>
      <circle cx="975" cy="175" r="15"/>
    </g>
    <path d="M983 169L1059 254L1040 250L1041 270L967 182z" fill="#E8618C"/>
    <path d="M974 165L1084 149L1069 163L1087 173L976 185z" fill="#E8618C"/>
    <ellipse cx="1015" cy="147" rx="40" ry="22" transform="rotate(-30 1015 147)" fill="#E8618C"/>
    <ellipse cx="1015" cy="203" rx="40" ry="22" transform="rotate(30 1015 203)" fill="#E8618C"/>
