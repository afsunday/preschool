<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="A fan of coloured pencils with a sharpener and shavings">
  <rect width="1200" height="400" fill="#E8618C"/>
  <circle cx="880" cy="200" r="235" fill="#000" opacity="0.08"/>

  <!-- fan of pencils, all pivoting on the butt end at 880,250 -->
  <g transform="rotate(-26 880 250)">
    <path transform="translate(0 6)" d="M700 238h180v24H700l-32-12z" fill="#000" opacity="0.12"/>
    <rect x="700" y="238" width="180" height="24" rx="3" fill="#7C5CFF"/>
    <path d="M700 238l-32 12 32 12z" fill="#F2E3C4"/>
    <path d="M676 246l-8 4 8 4z" fill="#5B3AC4"/>
    <rect x="724" y="244" width="90" height="6" rx="3" fill="#FFF" opacity="0.35"/>
  </g>
  <g transform="rotate(-12 880 250)">
    <path transform="translate(0 6)" d="M700 238h180v24H700l-32-12z" fill="#000" opacity="0.12"/>
    <rect x="700" y="238" width="180" height="24" rx="3" fill="#31C48D"/>
    <path d="M700 238l-32 12 32 12z" fill="#F2E3C4"/>
    <path d="M676 246l-8 4 8 4z" fill="#1E8A62"/>
    <rect x="724" y="244" width="90" height="6" rx="3" fill="#FFF" opacity="0.35"/>
  </g>
  <g transform="rotate(6 880 250)">
    <path transform="translate(0 6)" d="M700 238h180v24H700l-32-12z" fill="#000" opacity="0.12"/>
    <rect x="700" y="238" width="180" height="24" rx="3" fill="#FFC94A"/>
    <path d="M700 238l-32 12 32 12z" fill="#F2E3C4"/>
    <path d="M676 246l-8 4 8 4z" fill="#E0A413"/>
    <rect x="724" y="244" width="90" height="6" rx="3" fill="#FFF" opacity="0.35"/>
  </g>
  <g transform="rotate(22 880 250)">
    <path transform="translate(0 6)" d="M700 238h180v24H700l-32-12z" fill="#000" opacity="0.12"/>
    <rect x="700" y="238" width="180" height="24" rx="3" fill="#5B6BD6"/>
    <path d="M700 238l-32 12 32 12z" fill="#F2E3C4"/>
    <path d="M676 246l-8 4 8 4z" fill="#5B3AC4"/>
    <rect x="724" y="244" width="90" height="6" rx="3" fill="#FFF" opacity="0.35"/>
  </g>

  <!-- sharpener -->
  <g transform="rotate(-12 950 292)">
    <g transform="translate(0 6)" fill="#000" opacity="0.12">
      <rect x="900" y="254" width="100" height="76" rx="10"/>
      <path d="M902 276v20l-18-10z"/>
    </g>
    <path d="M902 276v20l-18-10z" fill="#3A3A48"/>
    <rect x="900" y="254" width="100" height="76" rx="10" fill="#5B6BD6"/>
    <rect x="922" y="272" width="56" height="22" rx="3" fill="#B9BCC4"/>
    <circle cx="950" cy="283" r="5" fill="#3A3A48"/>
    <rect x="914" y="264" width="34" height="6" rx="3" fill="#FFF" opacity="0.35"/>
  </g>

  <!-- shavings -->
  <g transform="rotate(-8 1036 238)">
    <path transform="translate(0 6)" d="M1006 240a34 26 0 0 1 62 4" fill="none" stroke="#000" stroke-width="16" stroke-linecap="round" opacity="0.12"/>
    <path d="M1006 240a34 26 0 0 1 62 4" fill="none" stroke="#F2E3C4" stroke-width="16" stroke-linecap="round"/>
    <path d="M1004 233a38 28 0 0 1 66 4" fill="none" stroke="#E0A413" stroke-width="5" stroke-linecap="round"/>
  </g>
  <g transform="rotate(16 1022 300)">
    <path transform="translate(0 6)" d="M1000 300a24 18 0 0 1 44 3" fill="none" stroke="#000" stroke-width="14" stroke-linecap="round" opacity="0.12"/>
    <path d="M1000 300a24 18 0 0 1 44 3" fill="none" stroke="#F2E3C4" stroke-width="14" stroke-linecap="round"/>
    <path d="M998 294a28 20 0 0 1 48 3" fill="none" stroke="#31C48D" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
