<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Falling autumn leaves with a conker and a bare twig">
  <rect width="1200" height="400" fill="#D98A1F"/>
  <circle cx="880" cy="200" r="235" fill="#000" opacity="0.08"/>

  <!-- bare twig -->
