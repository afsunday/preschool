    <g opacity="0.12" transform="translate(0 6)">
      <path d="M0 0c46 30 58 76 0 126c-58-50-46-96 0-126z" fill="#000"/>
      <path d="M0 124v20" fill="none" stroke="#000" stroke-width="7" stroke-linecap="round"/>
    </g>
    <path d="M0 0c46 30 58 76 0 126c-58-50-46-96 0-126z" fill="#FFC94A"/>
    <path d="M0 124v20M0 14V114M0 44l24 18M0 44l-24 18M0 76l22 18M0 76l-22 18" fill="none" stroke="#6B4A2A" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- leaf -->
