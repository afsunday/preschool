      <path d="M800 310q16-42 0-78" stroke-width="10"/>
      <path d="M940 256q30-16 40-48" stroke-width="10"/>
    </g>
  </g>

  <!-- leaf -->
  <g transform="translate(696 126) rotate(-26)">
    <g opacity="0.12" transform="translate(0 6)">
      <path d="M0 0c46 30 58 76 0 126c-58-50-46-96 0-126z" fill="#000"/>
