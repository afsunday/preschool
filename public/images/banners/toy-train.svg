      <rect x="838" y="152" width="86" height="72" rx="8" fill="#E8455A"/>
      <rect x="856" y="170" width="50" height="40" rx="6" fill="#FFF6F9"/>
      <rect x="976" y="170" width="34" height="50" rx="4" fill="#3A3A48"/>
      <rect x="968" y="164" width="50" height="14" rx="6" fill="#3A3A48"/>
      <rect x="1028" y="228" width="16" height="48" rx="4" fill="#FFC94A"/>
      <rect x="838" y="216" width="190" height="72" rx="10" fill="#E8455A"/>
      <rect x="838" y="248" width="190" height="12" fill="#FFC94A"/>
      <g fill="#3A3A48">
