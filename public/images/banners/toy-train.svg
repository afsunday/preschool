      <rect x="676" y="192" width="44" height="44" rx="6" fill="#FFC94A"/>
      <rect x="736" y="188" width="48" height="48" rx="6" fill="#E8618C"/>
      <rect x="812" y="258" width="32" height="10" rx="5" fill="#3A3A48"/>
