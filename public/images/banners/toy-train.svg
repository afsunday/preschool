      <rect x="908" y="322" width="210" height="5" rx="2" fill="#E0A413"/>
      <rect x="908" y="332" width="210" height="5" rx="2" fill="#E0A413"/>
    </g>

    <!-- carriage -->
    <g fill="#000" opacity="0.12" transform="translate(0 6)">
      <rect x="660" y="236" width="152" height="52" rx="8"/>
      <rect x="676" y="192" width="44" height="44" rx="6"/>
      <rect x="736" y="188" width="48" height="48" rx="6"/>
      <circle cx="696" cy="288" r="26"/>
