      <rect x="968" y="164" width="50" height="14" rx="6"/>
      <rect x="976" y="170" width="34" height="50" rx="4"/>
      <rect x="838" y="216" width="190" height="72" rx="10"/>
      <rect x="1028" y="228" width="16" height="48" rx="4"/>
