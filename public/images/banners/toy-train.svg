<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Wooden toy train engine and carriage on track pieces">
  <rect width="1200" height="400" fill="#5B6BD6"/>
  <circle cx="880" cy="200" r="235" fill="#000" opacity="0.08"/>

  <g transform="rotate(-2 880 260)">
    <!-- wooden track pieces -->
    <g>
      <rect x="640" y="320" width="248" height="30" rx="6" fill="#000" opacity="0.12"/>
      <rect x="640" y="314" width="248" height="30" rx="6" fill="#F2E3C4"/>
      <rect x="654" y="322" width="220" height="5" rx="2" fill="#E0A413"/>
      <rect x="654" y="332" width="220" height="5" rx="2" fill="#E0A413"/>
