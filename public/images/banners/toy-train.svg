      <rect x="660" y="262" width="152" height="10" fill="#1E8A62"/>
      <g fill="#3A3A48">
        <circle cx="696" cy="288" r="26"/>
        <circle cx="782" cy="288" r="26"/>
      </g>
      <g fill="#FFC94A">
        <circle cx="696" cy="288" r="9"/>
