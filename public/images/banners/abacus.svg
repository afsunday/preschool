    <g fill="#E8618C">
      <circle cx="762" cy="186" r="17"/><circle cx="798" cy="186" r="17"/><circle cx="834" cy="186" r="17"/>
      <circle cx="902" cy="186" r="17"/><circle cx="938" cy="186" r="17"/><circle cx="974" cy="186" r="17"/><circle cx="1010" cy="186" r="17"/>
    </g>
    <g fill="#FFC94A">
      <circle cx="762" cy="232" r="17"/><circle cx="798" cy="232" r="17"/><circle cx="834" cy="232" r="17"/><circle cx="870" cy="232" r="17"/><circle cx="906" cy="232" r="17"/>
      <circle cx="974" cy="232" r="17"/><circle cx="1010" cy="232" r="17"/>
    </g>
    <g fill="#31C48D">
