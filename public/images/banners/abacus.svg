<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Abacus with rows of coloured counting beads">
  <rect width="1200" height="400" fill="#E07A2F"/>
  <circle cx="880" cy="200" r="235" fill="#000" opacity="0.08"/>

