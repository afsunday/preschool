    <path d="M884 240c-14 18-22 28-22 38a22 22 0 0 0 44 0c0-10-8-20-22-38z" fill="#FFF6F9"/>
    <path d="M652 186c-11 15-18 23-18 31a18 18 0 0 0 36 0c0-8-7-16-18-31z" fill="#FFF6F9"/>
    <path d="M1108 176c-12 16-20 25-20 34a20 20 0 0 0 40 0c0-9-8-18-20-34z" fill="#FFF6F9"/>
  </g>
</svg>
