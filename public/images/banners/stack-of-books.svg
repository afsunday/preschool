  <!-- open book resting on the stack -->
  <g transform="rotate(-4 860 172)">
    <path d="M750 130q55-18 110 0v92q-55-18-110 0z" fill="#000" opacity="0.12" transform="translate(0 6)"/>
    <path d="M970 130q-55-18-110 0v92q55-18 110 0z" fill="#000" opacity="0.12" transform="translate(0 6)"/>
    <path d="M750 130q55-18 110 0v92q-55-18-110 0z" fill="#FFFFFF"/>
    <path d="M970 130q-55-18-110 0v92q55-18 110 0z" fill="#FFF6F9"/>
    <path d="M860 130v92" stroke="#B9BCC4" stroke-width="4"/>
    <g stroke="#B9BCC4" stroke-width="5" stroke-linecap="round">
      <path d="M772 158h68M772 178h68M772 198h48"/>
      <path d="M880 158h68M880 178h68M880 198h48"/>
