<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Card of music notes on a stave with a tuning fork">
  <rect width="1200" height="400" fill="#E07A2F"/>
  <circle cx="880" cy="200" r="235" fill="#000" opacity="0.08"/>

  <!-- stave card with chunky notes -->
  <g transform="rotate(-7 815 235)">
    <rect x="650" y="146" width="330" height="190" rx="10" fill="#000" opacity="0.12"/>
    <rect x="650" y="140" width="330" height="190" rx="10" fill="#FFF6F9"/>
    <g stroke="#B9BCC4" stroke-width="5" stroke-linecap="round">
      <path d="M678 192h274M678 214h274M678 236h274M678 258h274M678 280h274"/>
    </g>
    <!-- beamed pair -->
    <g fill="#E8455A">
      <rect x="728" y="186" width="8" height="96"/>
      <rect x="796" y="186" width="8" height="74"/>
      <rect x="728" y="178" width="76" height="14" rx="3"/>
      <ellipse cx="716" cy="280" rx="17" ry="12" transform="rotate(-18 716 280)"/>
      <ellipse cx="784" cy="258" rx="17" ry="12" transform="rotate(-18 784 258)"/>
    </g>
    <!-- flagged note -->
    <g fill="#31C48D">
      <rect x="874" y="168" width="8" height="80"/>
      <path d="M882 168q34 14 24 52q-4-30-24-36z"/>
      <ellipse cx="862" cy="236" rx="17" ry="12" transform="rotate(-18 862 236)"/>
    </g>
    <!-- quarter note -->
    <g fill="#5B6BD6">
      <rect x="938" y="198" width="8" height="78"/>
      <ellipse cx="926" cy="269" rx="17" ry="12" transform="rotate(-18 926 269)"/>
    </g>
  </g>

  <!-- loose note -->
  <g transform="rotate(10 1058 150)">
    <g transform="translate(0 6)" fill="#000" opacity="0.12">
      <rect x="1057" y="112" width="9" height="68" rx="2"/>
      <path d="M1066 112q36 18 26 54q-5-30-26-34z"/>
      <ellipse cx="1042" cy="178" rx="21" ry="15" transform="rotate(-18 1042 178)"/>
    </g>
    <rect x="1057" y="112" width="9" height="68" rx="2" fill="#7C5CFF"/>
    <path d="M1066 112q36 18 26 54q-5-30-26-34z" fill="#7C5CFF"/>
    <ellipse cx="1042" cy="178" rx="21" ry="15" fill="#7C5CFF" transform="rotate(-18 1042 178)"/>
  </g>

  <!-- tuning fork -->
  <g transform="rotate(34 1026 267)">
    <g transform="translate(0 6)" opacity="0.12">
      <path d="M1000 200v58a26 26 0 0 0 52 0v-58" fill="none" stroke="#000" stroke-width="12" stroke-linecap="round"/>
      <rect x="1019" y="278" width="14" height="52" rx="7" fill="#000"/>
      <rect x="1012" y="318" width="28" height="22" rx="10" fill="#000"/>
    </g>
    <path d="M1000 200v58a26 26 0 0 0 52 0v-58" fill="none" stroke="#B9BCC4" stroke-width="12" stroke-linecap="round"/>
    <rect x="1019" y="278" width="14" height="52" rx="7" fill="#B9BCC4"/>
    <rect x="1012" y="318" width="28" height="22" rx="10" fill="#B9BCC4"/>
  </g>
</svg>
