<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Cluster of party balloons with ribbon curls">
  <!-- Google-Classroom-style flat lay: solid field on the left for the class
       title, objects clustered right on a soft disc. -->
  <rect width="1200" height="400" fill="#5B6BD6"/>
  <circle cx="880" cy="200" r="235" fill="#000" opacity="0.08"/>

  <!-- ribbons gathered to a bow -->
  <g fill="none" stroke="#FFF6F9" stroke-width="4" stroke-linecap="round">
    <path d="M706 275C724 314 802 314 880 328"/>
    <path d="M799 236C812 274 856 296 880 328"/>
    <path d="M933 265C930 292 902 304 880 328"/>
    <path d="M1025 237C1020 290 948 302 880 328"/>
  </g>

  <!-- balloons -->
  <g transform="rotate(-10 694 206)">
    <ellipse cx="694" cy="212" rx="46" ry="55" fill="#000" opacity="0.12"/>
    <ellipse cx="694" cy="206" rx="46" ry="55" fill="#E8618C"/>
    <path d="M686 258h16l-8 18z" fill="#E8455A"/>
    <ellipse cx="676" cy="184" rx="12" ry="18" transform="rotate(-26 676 184)" fill="#FFF" opacity="0.35"/>
  </g>
  <g transform="rotate(6 806 166)">
    <ellipse cx="806" cy="172" rx="46" ry="55" fill="#000" opacity="0.12"/>
    <ellipse cx="806" cy="166" rx="46" ry="55" fill="#FFC94A"/>
    <path d="M798 218h16l-8 18z" fill="#E0A413"/>
    <ellipse cx="788" cy="144" rx="12" ry="18" transform="rotate(-26 788 144)" fill="#FFF" opacity="0.35"/>
  </g>
  <g transform="rotate(-7 924 196)">
    <ellipse cx="924" cy="202" rx="46" ry="55" fill="#000" opacity="0.12"/>
    <ellipse cx="924" cy="196" rx="46" ry="55" fill="#31C48D"/>
    <path d="M916 248h16l-8 18z" fill="#1E8A62"/>
    <ellipse cx="906" cy="174" rx="12" ry="18" transform="rotate(-26 906 174)" fill="#FFF" opacity="0.35"/>
  </g>
  <g transform="rotate(11 1038 168)">
    <ellipse cx="1038" cy="174" rx="46" ry="55" fill="#000" opacity="0.12"/>
    <ellipse cx="1038" cy="168" rx="46" ry="55" fill="#7C5CFF"/>
    <path d="M1030 220h16l-8 18z" fill="#5B3AC4"/>
    <ellipse cx="1020" cy="146" rx="12" ry="18" transform="rotate(-26 1020 146)" fill="#FFF" opacity="0.35"/>
  </g>

  <!-- bow holding the ribbons -->
  <g>
    <g fill="#000" opacity="0.12" transform="translate(0 6)">
      <ellipse cx="858" cy="330" rx="20" ry="12" transform="rotate(-22 858 330)"/>
      <ellipse cx="902" cy="330" rx="20" ry="12" transform="rotate(22 902 330)"/>
      <circle cx="880" cy="330" r="9"/>
    </g>
    <path d="M874 336q-16 18-34 20M886 336q16 18 34 20" fill="none" stroke="#FFC94A" stroke-width="6" stroke-linecap="round"/>
    <ellipse cx="858" cy="330" rx="20" ry="12" transform="rotate(-22 858 330)" fill="#FFC94A"/>
    <ellipse cx="902" cy="330" rx="20" ry="12" transform="rotate(22 902 330)" fill="#FFC94A"/>
    <circle cx="880" cy="330" r="9" fill="#E0A413"/>
  </g>
</svg>
