<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Wrapped gift boxes with ribbons and a gift tag">
  <!-- Google-Classroom-style flat lay: solid field on the left for the class
       title, objects clustered right on a soft disc. -->
  <rect width="1200" height="400" fill="#E07A2F"/>
  <circle cx="880" cy="200" r="235" fill="#000" opacity="0.08"/>

  <!-- wrapped box -->
  <g transform="rotate(-8 730 264)">
    <rect x="656" y="196" width="148" height="148" rx="8" fill="#000" opacity="0.12"/>
    <rect x="656" y="190" width="148" height="148" rx="8" fill="#7C5CFF"/>
    <rect x="719" y="190" width="22" height="148" fill="#FFC94A"/>
    <rect x="656" y="253" width="148" height="22" fill="#FFC94A"/>
    <path d="M724 272l-16 26M736 272l16 26" fill="none" stroke="#FFC94A" stroke-width="7" stroke-linecap="round"/>
    <ellipse cx="710" cy="264" rx="20" ry="13" transform="rotate(-30 710 264)" fill="#FFC94A"/>
    <ellipse cx="750" cy="264" rx="20" ry="13" transform="rotate(30 750 264)" fill="#FFC94A"/>
    <circle cx="730" cy="264" r="8" fill="#E0A413"/>
  </g>

  <!-- wrapped box -->
  <g transform="rotate(11 886 186)">
    <rect x="820" y="126" width="132" height="132" rx="8" fill="#000" opacity="0.12"/>
    <rect x="820" y="120" width="132" height="132" rx="8" fill="#31C48D"/>
    <rect x="875" y="120" width="22" height="132" fill="#FFF6F9"/>
    <rect x="820" y="175" width="132" height="22" fill="#FFF6F9"/>
    <path d="M880 194l-16 26M892 194l16 26" fill="none" stroke="#FFF6F9" stroke-width="7" stroke-linecap="round"/>
    <ellipse cx="866" cy="186" rx="20" ry="13" transform="rotate(-30 866 186)" fill="#FFF6F9"/>
    <ellipse cx="906" cy="186" rx="20" ry="13" transform="rotate(30 906 186)" fill="#FFF6F9"/>
    <circle cx="886" cy="186" r="8" fill="#B9BCC4"/>
  </g>

  <!-- wrapped box -->
  <g transform="rotate(-6 1046 283)">
    <rect x="964" y="228" width="164" height="122" rx="8" fill="#000" opacity="0.12"/>
    <rect x="964" y="222" width="164" height="122" rx="8" fill="#FFF6F9"/>
    <rect x="1035" y="222" width="22" height="122" fill="#5B6BD6"/>
    <rect x="964" y="272" width="164" height="22" fill="#5B6BD6"/>
    <path d="M1040 291l-16 26M1052 291l16 26" fill="none" stroke="#5B6BD6" stroke-width="7" stroke-linecap="round"/>
    <ellipse cx="1026" cy="283" rx="20" ry="13" transform="rotate(-30 1026 283)" fill="#5B6BD6"/>
    <ellipse cx="1066" cy="283" rx="20" ry="13" transform="rotate(30 1066 283)" fill="#5B6BD6"/>
    <circle cx="1046" cy="283" r="8" fill="#5B3AC4"/>
  </g>

  <!-- gift tag on a string -->
  <path d="M847 328C806 322 762 306 734 272" fill="none" stroke="#FFF6F9" stroke-width="4" stroke-linecap="round"/>
  <g transform="rotate(-18 872 320)">
    <path d="M846 303h58a6 6 0 0 1 6 6v34a6 6 0 0 1-6 6h-58l-12-23z" fill="#000" opacity="0.12"/>
    <path d="M846 297h58a6 6 0 0 1 6 6v34a6 6 0 0 1-6 6h-58l-12-23z" fill="#FFF6F9"/>
    <path d="M858 313h40M858 328h30" stroke="#B9BCC4" stroke-width="5" stroke-linecap="round"/>
    <circle cx="846" cy="320" r="7" fill="#B9BCC4"/>
    <circle cx="846" cy="320" r="3.5" fill="#3A3A48"/>
  </g>
</svg>
