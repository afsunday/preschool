  <!-- round cutter -->
  <g>
    <circle cx="900" cy="306" r="34" fill="none" stroke="#000" stroke-width="9" opacity="0.12"/>
    <circle cx="900" cy="300" r="34" fill="none" stroke="#31C48D" stroke-width="9"/>
