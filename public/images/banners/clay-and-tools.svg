    <path transform="translate(0 6)" d="M750 276L757 296L779 297L762 310L768 330L750 318L732 330L738 310L721 297L743 296Z" fill="none" stroke="#000" stroke-width="9" stroke-linejoin="round" opacity="0.12"/>
