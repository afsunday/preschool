    <rect x="884" y="166" width="38" height="16" rx="8" fill="#6B4A2A"/>
    <rect x="1088" y="166" width="38" height="16" rx="8" fill="#6B4A2A"/>
    <rect x="920" y="150" width="170" height="48" rx="10" fill="#F2E3C4"/>
    <rect x="940" y="160" width="80" height="7" rx="3" fill="#FFF" opacity="0.35"/>
