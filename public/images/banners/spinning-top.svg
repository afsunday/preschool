    <circle cx="1046" cy="302" r="34" fill="#000" opacity="0.12"/>
    <circle cx="1046" cy="296" r="34" fill="#31C48D"/>
    <circle cx="1035" cy="285" r="10" fill="#FFF6F9" opacity="0.5"/>
