      <path d="M787 196L877 302L967 196Z"/>
      <ellipse cx="877" cy="196" rx="90" ry="20"/>
    </g>
    <rect x="866" y="132" width="22" height="66" rx="10" fill="#6B4A2A"/>
    <circle cx="877" cy="132" r="15" fill="#6B4A2A"/>
    <path d="M787 196L877 302L967 196Z" fill="#E8455A"/>
    <ellipse cx="877" cy="196" rx="90" ry="20" fill="#FFF6F9"/>
    <g stroke-linecap="round" fill="none">
