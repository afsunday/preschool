  <g>
    <circle cx="1112" cy="256" r="24" fill="#000" opacity="0.12"/>
    <circle cx="1112" cy="250" r="24" fill="#FFC94A"/>
    <circle cx="1104" cy="242" r="7" fill="#FFF6F9" opacity="0.5"/>
  </g>
  <g>
