<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Spinning top with jacks and marbles">
  <rect width="1200" height="400" fill="#7C5CFF"/>
  <circle cx="880" cy="200" r="235" fill="#000" opacity="0.08"/>

  <!-- jack -->
  <g transform="translate(700 196) rotate(12)">
    <g fill="none" stroke-linecap="round">
      <path d="M-34 6h68M0-28v68M-24-18l48 48" stroke="#000" stroke-width="11" opacity="0.12"/>
      <path d="M-34 0h68M0-34v68M-24-24l48 48" stroke="#B9BCC4" stroke-width="11"/>
    </g>
    <g fill="#B9BCC4">
