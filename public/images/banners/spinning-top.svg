      <circle cy="-34" r="9"/><circle cy="34" r="9"/>
      <circle cx="-24" cy="-24" r="9"/><circle cx="24" cy="24" r="9"/>
    </g>
  </g>

  <!-- jack -->
  <g transform="translate(1052 168) rotate(-24)">
    <g fill="none" stroke-linecap="round">
      <path d="M-34 6h68M0-28v68M-24-18l48 48" stroke="#000" stroke-width="11" opacity="0.12"/>
      <path d="M-34 0h68M0-34v68M-24-24l48 48" stroke="#FFF6F9" stroke-width="11"/>
