      <circle cy="-34" r="9"/><circle cy="34" r="9"/>
      <circle cx="-24" cy="-24" r="9"/><circle cx="24" cy="24" r="9"/>
    </g>
  </g>

  <!-- spinning top -->
  <g transform="rotate(-10 877 220)">
    <g fill="#000" opacity="0.12" transform="translate(0 6)">
