<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Number blocks showing one two three with counting discs">
  <rect width="1200" height="400" fill="#6B4A9E"/>
  <circle cx="880" cy="200" r="235" fill="#000" opacity="0.08"/>

  <!-- number blocks -->
  <g transform="rotate(-5 762 292)">
    <rect x="706" y="242" width="112" height="112" rx="10" fill="#000" opacity="0.12"/>
    <rect x="706" y="236" width="112" height="112" rx="10" fill="#E8618C"/>
    <text x="762" y="314" font-family="Verdana,DejaVu Sans,sans-serif" font-size="62" font-weight="bold" fill="#FFF6F9" text-anchor="middle">1</text>
  </g>
  <g transform="rotate(5 886 292)">
    <rect x="830" y="242" width="112" height="112" rx="10" fill="#000" opacity="0.12"/>
    <rect x="830" y="236" width="112" height="112" rx="10" fill="#FFC94A"/>
    <text x="886" y="314" font-family="Verdana,DejaVu Sans,sans-serif" font-size="62" font-weight="bold" fill="#3A3A48" text-anchor="middle">2</text>
  </g>
  <g transform="rotate(-3 824 174)">
    <rect x="768" y="124" width="112" height="112" rx="10" fill="#000" opacity="0.12"/>
    <rect x="768" y="118" width="112" height="112" rx="10" fill="#31C48D"/>
    <text x="824" y="196" font-family="Verdana,DejaVu Sans,sans-serif" font-size="62" font-weight="bold" fill="#FFF6F9" text-anchor="middle">3</text>
  </g>

  <!-- counting discs -->
  <g>
    <circle cx="970" cy="310" r="38" fill="#000" opacity="0.12"/>
    <circle cx="970" cy="304" r="38" fill="#31C48D"/>
    <circle cx="970" cy="304" r="15" fill="#FFF6F9"/>
    <circle cx="1010" cy="257" r="38" fill="#000" opacity="0.12"/>
    <circle cx="1010" cy="251" r="38" fill="#E8455A"/>
    <circle cx="1010" cy="251" r="15" fill="#FFF6F9"/>
    <circle cx="1050" cy="204" r="38" fill="#000" opacity="0.12"/>
    <circle cx="1050" cy="198" r="38" fill="#FFC94A"/>
    <circle cx="1050" cy="198" r="15" fill="#FFF6F9"/>
  </g>
</svg>
