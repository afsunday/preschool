<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Toy drum with crossed drumsticks and a cymbal">
  <rect width="1200" height="400" fill="#7C5CFF"/>
  <circle cx="880" cy="200" r="235" fill="#000" opacity="0.08"/>

  <!-- small cymbal tucked behind the drum -->
  <g>
    <circle cx="712" cy="304" r="48" fill="#000" opacity="0.12"/>
    <circle cx="712" cy="298" r="48" fill="#FFC94A"/>
    <circle cx="712" cy="298" r="20" fill="#E0A413"/>
    <circle cx="712" cy="298" r="5" fill="#6B4A2A"/>
  </g>

  <!-- toy drum, seen from above: shell, hoop, head, tension lugs -->
  <g transform="rotate(-6 850 230)">
    <circle cx="850" cy="236" r="122" fill="#000" opacity="0.12"/>
    <circle cx="850" cy="230" r="122" fill="#E8455A"/>
    <circle cx="850" cy="230" r="106" fill="#FFC94A"/>
    <circle cx="850" cy="230" r="94" fill="#FFF6F9"/>
    <g fill="#E0A413">
      <circle cx="964" cy="230" r="9"/>
      <circle cx="931" cy="311" r="9"/>
      <circle cx="850" cy="344" r="9"/>
      <circle cx="769" cy="311" r="9"/>
      <circle cx="736" cy="230" r="9"/>
      <circle cx="769" cy="149" r="9"/>
      <circle cx="850" cy="116" r="9"/>
      <circle cx="931" cy="149" r="9"/>
    </g>
    <circle cx="850" cy="230" r="22" fill="#E8618C"/>
    <circle cx="850" cy="230" r="9" fill="#FFF6F9"/>
  </g>

  <!-- crossed sticks -->
  <g transform="rotate(-34 1010 250)">
    <rect x="905" y="247" width="210" height="18" rx="9" fill="#000" opacity="0.12"/>
    <rect x="905" y="241" width="210" height="18" rx="9" fill="#F2E3C4"/>
    <circle cx="1098" cy="250" r="13" fill="#6B4A2A"/>
  </g>
  <g transform="rotate(34 1010 250)">
    <rect x="905" y="247" width="210" height="18" rx="9" fill="#000" opacity="0.12"/>
    <rect x="905" y="241" width="210" height="18" rx="9" fill="#F2E3C4"/>
    <circle cx="1098" cy="250" r="13" fill="#6B4A2A"/>
  </g>
</svg>
