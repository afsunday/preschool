      <rect x="703" y="160" width="28" height="10" rx="5"/>
      <rect x="703" y="184" width="28" height="10" rx="5"/>
      <rect x="703" y="208" width="28" height="10" rx="5"/>
      <rect x="703" y="232" width="28" height="10" rx="5"/>
      <rect x="703" y="256" width="28" height="10" rx="5"/>
      <rect x="703" y="280" width="28" height="10" rx="5"/>
