    <rect x="719" y="121" width="210" height="222" rx="6" fill="#000" opacity="0.12"/>
    <rect x="715" y="115" width="210" height="222" rx="6" fill="#FFF6F9"/>
    <rect x="742" y="125" width="4" height="202" fill="#E8618C"/>
    <g fill="#B9BCC4">
      <rect x="758" y="170" width="150" height="5" rx="2.5"/>
      <rect x="758" y="198" width="150" height="5" rx="2.5"/>
      <rect x="758" y="226" width="150" height="5" rx="2.5"/>
      <rect x="758" y="254" width="150" height="5" rx="2.5"/>
      <rect x="758" y="282" width="150" height="5" rx="2.5"/>
      <rect x="758" y="310" width="106" height="5" rx="2.5"/>
